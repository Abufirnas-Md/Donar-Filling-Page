<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroWaste NGO Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Submit a Food Donation</h1>
    <p class="subtitle">Fill in the details below. Donations must be submitted within 2 hours of cooking.</p>

    <form id="donationForm">
      <div class="card">
        <!-- Priority Section -->
        <div class="form-section">
          <label>Donation priority</label>
          <div class="priority-toggle">
            <button type="button" id="urgentBtn" class="btn-priority">
              <span class="dot red"></span> Urgent — expires soon
            </button>
            <button type="button" id="normalBtn" class="btn-priority active-normal">
              <span class="dot green"></span> Normal
            </button>
          </div>
        </div>

        <!-- Food Type -->
        <div class="form-group">
          <label for="foodtype">Food Type</label>
          <select id="foodtype" required>
            <option value="" disabled selected>Select food variety</option>
            <option>Veg</option>
            <option>Non-Veg</option>
            <option>Others (Drinks, Fruits)</option>
          </select>
        </div>

        <!-- Food Details -->
        <div id="foodDetails" class="hidden-section">
          <div class="form-group">
            <label for="foodDetail">Food Detail</label>
            <input type="text" id="foodDetail" placeholder="Type about food" required>
          </div>

          <div class="form-group">
            <label for="foodQty">Quantity (servings)</label>
            <input type="number" id="foodQty" placeholder="e.g. 30" required>
          </div>

          <div class="form-group">
            <label for="cookTime">Cooked at (time)</label>
            <select id="cookTime" required>
              <option value="" disabled selected>Select time</option>
              <option value="now">Just now</option>
              <option value="30m">30 mins ago</option>
              <option value="1h">1 hour ago</option>
              <option value="2h">2 hours ago</option>
            </select>
          </div>
          <button type="button" class="next-btn" onclick="validateStep('foodDetails', 'locationSection')">Next</button>
        </div>

        <!-- Location Section -->
        <div id="locationSection" class="hidden-section">
          <div class="form-group">
            <label for="pickupAddr">Pickup Address</label>
            <input type="text" id="pickupAddr" placeholder="Street address, area, city" required>
          </div>
          <button type="button" class="next-btn" onclick="validateStep('locationSection', 'finalSection')">Next</button>
        </div>

        <!-- Final Section -->
        <div id="finalSection" class="hidden-section">
          <div class="form-group">
            <label for="mobile">Donor contact (mobile)</label>
            <div class="otp-group">
              <input type="tel" id="mobile" placeholder="XXXXXXXXXX" pattern="[0-9]{10}" required>
              <button type="button" class="otp-btn">Send OTP</button>
            </div>
          </div>

          <div class="form-group">
            <label for="foodPhoto">Food photo (Required — AI freshness check)</label>
            <div class="file-input">
              <input type="file" id="foodPhoto" accept="image/*" required>
            </div>
          </div>

          <div class="form-group">
            <label for="extraNotes">Additional notes</label>
            <textarea id="extraNotes" placeholder="Allergies, packaging, storage instructions..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">Submit donation</button>
        </div>
      </div>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
